<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamPrep | אין חיבור לאינטרנט</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0f0f0f;
        color: #e5e7eb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: block;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #f9fafb;
      }
      p {
        font-size: 1rem;
        color: #9ca3af;
        line-height: 1.6;
        margin-bottom: 1.25rem;
      }
      .hint {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 2rem;
      }
      button {
        background-color: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #6d28d9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="icon">📡</span>
      <h1>אין חיבור לאינטרנט</h1>
      <p>
        לא ניתן לטעון את האפליקציה כרגע.<br />
        בדוק את חיבור האינטרנט שלך ונסה שוב.
      </p>
      <p class="hint">
        שאלות שכבר תרגלת עשויות להיות זמינות לאחר התחברות מחדש.
      </p>
      <button onclick="window.location.reload()">נסה שוב</button>
    </div>
  </body>
</html>
