name: Feature Request / Epic
description: Propose a new feature or product epic
title: "[FEATURE] <short description>"
labels: ["feature", "triage"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical
        - P1 — High
        - P2 — Medium
        - P3 — Low
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What user/system problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: High-level description of the approach
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks & Rollback Path
      placeholder: What could break? How do we revert?
    validations:
      required: false
  - type: input
    id: phase
    attributes:
      label: Roadmap Phase
      placeholder: e.g. Phase 10 — DevOps & Reliability
    validations:
      required: false
