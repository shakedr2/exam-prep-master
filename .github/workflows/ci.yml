name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Check bundle size budget
        # Fail if any single JS chunk exceeds 1 MB (uncompressed).
        # The threshold can be tightened over time as the bundle shrinks.
        run: |
          BUDGET_BYTES=1048576
          OVER_BUDGET=0
          for f in dist/assets/*.js; do
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt "$BUDGET_BYTES" ]; then
              echo "❌ Bundle exceeds budget: $f ($SIZE bytes > $BUDGET_BYTES bytes)"
              OVER_BUDGET=1
            fi
          done
          if [ "$OVER_BUDGET" -eq 1 ]; then
            exit 1
          fi
          echo "✅ All JS chunks are within the 1 MB budget."
